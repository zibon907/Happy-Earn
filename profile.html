<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8">

<meta
    name="viewport"
    content="width=device-width, initial-scale=1.0">

<title>
    Profile
</title>

<link
    rel="stylesheet"
    href="style.css">

</head><body><nav class="navbar">

    <div class="nav-logo">

        Virtual Rewards

    </div>

    <div class="nav-user">

        <span id="navUserName">

            User

        </span>

        <div class="avatar"></div>

    </div>

</nav>

<main class="profile-wrapper">

    <div class="card">

        <h2>
            Profile Overview
        </h2>

        <br>

        <div class="profile-info">

            <strong>
                Full Name
            </strong>

            <p id="fullName"></p>

        </div>

        <br>

        <div class="profile-info">

            <strong>
                Username
            </strong>

            <p id="username"></p>

        </div>

        <br>

        <div class="profile-info">

            <strong>
                Email
            </strong>

            <p id="email"></p>

        </div>

        <br>

        <div class="profile-info">

            <strong>
                VIP Level
            </strong>

            <p id="vipLevel"></p>

        </div>

        <br>

        <div class="profile-info">

            <strong>
                Referral Code
            </strong>

            <p id="referralCode"></p>

        </div>

        <br>

        <div class="profile-info">

            <strong>
                Total Points
            </strong>

            <p id="points"></p>

        </div>

        <br>

        <button
            class="btn btn-primary"
            onclick="goDashboard()">

            Dashboard

        </button>

    </div>

</main>

<script src="profile.js"></script>

</body></html>
